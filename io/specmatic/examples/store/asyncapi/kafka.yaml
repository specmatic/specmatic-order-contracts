asyncapi: 3.0.0
info:
  title: Product audits API
  version: 1.0.0
servers:
  kafka-server:
    host: 'localhost:9092'
    protocol: kafka
channels:
  product-queries:
    address: product-queries
    messages:
      publishObjectMessage.message:
        $ref: '#/components/messages/product'
    servers:
      - $ref: '#/servers/kafka-server'
operations:
  publishObjectMessage:
    action: receive
    channel:
      $ref: '#/channels/product-queries'
    messages:
      - $ref: '#/channels/product-queries/messages/publishObjectMessage.message'
components:
  messages:
    product:
      name: product
      title: An inventory product
      summary: Product representing items in inventory
      contentType: application/json
      headers:
        type: object
        required:
          - correlationId
        properties:
          correlationId:
            description: Correlation id used to match the product search request and emitted event
            type: string
      correlationId:
        $ref: '#/components/correlationIds/productCorrelationId'
      payload:
        type: object
        properties:
          name:
            description: Every product has a name
            type: string
          inventory:
            description: Count of items in inventory
            type: integer
          id:
            description: Unique indentifier of the product
            type: integer
          categories:
            description: A list of product categories
            type: array
            items:
              $ref: '#/components/schemas/category'
  schemas:
    category:
      type: object
      properties:
        id:
          description: The id of the category
          type: integer
        name:
          description: The name of the category
          type: string
  correlationIds:
    productCorrelationId:
      location: '$message.header#/correlationId'

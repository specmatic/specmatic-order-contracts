name: Specmatic Insights Central Contract Repo Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Save Specmatic license
        run: |
          mkdir -p ~/.specmatic
          echo "${{ secrets.SPECMATIC_LICENSE_KEY }}" > ~/.specmatic/specmatic-license.txt

      - name: Run Specmatic linter on OpenAPI specs
        run: |
         docker run --rm \
          -v "$(pwd):/usr/src/app" \
          -v "$HOME/.specmatic:/root/.specmatic:ro" \
          -w /usr/src/app \
          specmatic/enterprise \
          lint 'io/specmatic/examples/store/openapi/*.yaml'

      - name: Generate central contract repo report
        run: |
          docker run -v "$(pwd):/usr/src/app" \
            specmatic/specmatic \
            central-contract-repo-report

      - name: Show license
        run: |
          docker run \
            -v $(pwd):/usr/src/app \
            -v ~/.specmatic:/root/.specmatic \
            specmatic/specmatic \
            show-license
            
      - name: Publish Build Report to Specmatic Insights
        run: |
          docker run \
            --rm \
            -e GIT_DISCOVERY_ACROSS_FILESYSTEM=1 \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/usr/src/app \
            -v "$(pwd):/usr/src/app" \
            -v "${HOME}/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            specmatic/specmatic \
            send-report \
            --metadata build_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --branch-name ${{ github.ref_name }} \
            --repo-name ${{ github.event.repository.name }} \
            --repo-id ${{ github.repository_id }} \
            --repo-url ${{ github.event.repository.html_url }}
